services:
  - type: web
    name: stockpulse
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn stock-server:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: stockpulse-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: stockpulse-db
    databaseName: stockpulse
    plan: free
