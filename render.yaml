services:
  - type: web
    name: stockpulse
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 1 --worker-class gthread --threads 8 --timeout 300 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/ping
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
