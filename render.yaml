services:
  - type: web
    name: stockpulse
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: .
    buildCommand: npm install && npm --prefix client install && npm --prefix client run build && npm --prefix server install
    startCommand: node server/index.js
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: UPSTOX_ACCESS_TOKEN
        sync: false
