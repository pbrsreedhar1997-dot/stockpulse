<div class="shell">
  <!-- Mobile overlay backdrop -->
  @if (showMobile()) {
    <div class="mobile-overlay" (click)="showMobile.set(false)"></div>
  }

  <!-- Sidebar -->
  <div class="sidebar-wrap" [class.mobile-open]="showMobile()">
    <app-sidebar
      [selected]="selectedSym()"
      (selectSym)="selectStock($event)"
      (openAuth)="showAuth.set(true)"
    />
  </div>

  <!-- Main area -->
  <div class="main">
    <!-- Top nav -->
    <div class="topnav">
      <div class="tnav-left">
        <button class="hamburger" (click)="showMobile.set(!showMobile())" title="Watchlist">
          <span></span><span></span><span></span>
        </button>
        <button class="tnav-btn" [class.active]="view()==='stocks'"   (click)="switchView('stocks')">📊 Stocks</button>
        <button class="tnav-btn" [class.active]="view()==='screener'" (click)="switchView('screener')">💎 Value Picks</button>
        <button class="tnav-btn" [class.active]="view()==='chat'"     (click)="switchView('chat')">🤖 AI Chat</button>
      </div>
      <div class="tnav-right">
        <div class="be-pill" [class.ok]="backendOk()===true" [class.err]="backendOk()===false">
          {{backendOk() === null ? '⟳ Connecting…' : backendOk() ? '● Live' : '✕ Offline'}}
        </div>
        <button class="icon-btn" (click)="toggleTheme()" [title]="theme() === 'dark' ? 'Light mode' : 'Dark mode'">
          {{theme() === 'dark' ? '☀️' : '🌙'}}
        </button>
        @if (auth.isLoggedIn()) {
          <div class="user-chip">
            <span>{{auth.user()?.name || auth.user()?.email}}</span>
            <button (click)="logout()">Sign out</button>
          </div>
        } @else {
          <button class="signin-btn" (click)="showAuth.set(true)">Sign in</button>
        }
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      @if (view() === 'stocks') {
        <app-stock-detail [symbol]="selectedSym()" />
      }
      @if (view() === 'screener') {
        <app-screener (selectSym)="selectStock($event)" />
      }
      @if (view() === 'chat') {
        <app-chat />
      }
    </div>
  </div>
</div>

@if (showAuth()) {
  <app-auth-modal
    (close)="showAuth.set(false)"
    (success)="onAuthSuccess()"
  />
}
